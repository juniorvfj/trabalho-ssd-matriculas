openapi: 3.1.0
info:
  title: API de Unidades Organizacionais
  version: 1.0.0
  description: |
    Serviço de Entidade para gerenciamento de Unidades Organizacionais
    (departamentos, institutos, faculdades) da universidade.
    Conforme o diagrama de entidades, uma Unidade Organizacional está
    relacionada a Cursos e Disciplinas.
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: /api/UnidadeOrganizacional

paths:
  /unidades-organizacionais:
    get:
      summary: Listar todas as unidades organizacionais
      operationId: listUnidadesOrganizacionais
      tags:
        - Unidades Organizacionais
      parameters:
        - name: _count
          in: query
          description: Quantidade de registros a retornar
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: _offset
          in: query
          description: Quantidade de registros a pular (paginação)
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Lista de unidades organizacionais retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'

    post:
      summary: Cadastrar nova unidade organizacional
      operationId: createUnidadeOrganizacional
      tags:
        - Unidades Organizacionais
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnidadeOrganizacionalCreate'
      responses:
        '201':
          description: Unidade organizacional criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnidadeOrganizacionalResponse'
        '400':
          description: Dados inválidos ou código duplicado

  /unidades-organizacionais/{unidade_id}:
    get:
      summary: Buscar unidade organizacional por ID
      operationId: getUnidadeOrganizacionalById
      tags:
        - Unidades Organizacionais
      parameters:
        - name: unidade_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Unidade organizacional encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnidadeOrganizacionalResponse'
        '404':
          description: Unidade organizacional não encontrada

components:
  schemas:

    Resource:
      type: object
      required:
        - resourceType
      properties:
        id:
          type: string
          description: id único da instânica
        resourceType:
          type: string
        lastUpdated:
          type: string
          format: date-time
      discriminator:
        propertyName: resourceType
        mapping:
          Aluno: '#/components/schemas/Aluno'
          Curso: '#/components/schemas/Curso'
          Curriculo: '#/components/schemas/Curriculo'
          Disciplina: '#/components/schemas/Disciplina'
          Docente: '#/components/schemas/Docente'
          HistoricoAcademico: '#/components/schemas/HistoricoAcademico'
          Matricula: '#/components/schemas/Matricula'
          Turma: '#/components/schemas/Turma'
          UnidadeOrganizacional: '#/components/schemas/UnidadeOrganizacional'
    UnidadeOrganizacionalCreate:
      type: object
      required: [codigo, nome]
      properties:
        codigo:
          type: string
          maxLength: 20
          description: "Código da unidade (Ex: CIC, MAT, EST)"
        nome:
          type: string
          maxLength: 150
          description: "Nome completo da unidade (Ex: Departamento de Ciência da Computação)"
        ativo:
          type: boolean
          default: true
          description: Indica se a unidade está ativa

    UnidadeOrganizacionalResponse:
      allOf:
        - $ref: '#/components/schemas/UnidadeOrganizacionalCreate'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              description: Identificador único da unidade organizacional


    SearchSet:
      type: object  
      required:
        - total
        - link
      properties:
        total:
          type: integer 
        count:
          type: integer
        offset:
          type: integer     
        link:
          type: object
          required:
            - self
          properties:
            self:
              type: string
            next:
              type: string
            previous:
              type: string
        items:
          type: array
          items:
            anyOf:
            - $ref: '#/components/schemas/AlunoResponse'
            - $ref: '#/components/schemas/CursoResponse'
            - $ref: '#/components/schemas/CurriculoResponse'
            - $ref: '#/components/schemas/DisciplinaResponse'
            - $ref: '#/components/schemas/DocenteResponse'
            - $ref: '#/components/schemas/HistoricoAcademicoResponse'
            - $ref: '#/components/schemas/MatriculaResponse'
            - $ref: '#/components/schemas/TurmaResponse'
            - $ref: '#/components/schemas/UnidadeOrganizacionalResponse'
