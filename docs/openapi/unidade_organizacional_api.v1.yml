openapi: 3.1.0
info:
  title: Unidade Organizacional API
  description: 'Serviço de Entidade — Unidade Organizacional (modelo SIGAA: SIGAA_UNIDADE).'
  version: 1.0.0
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /api/UnidadeOrganizacional
paths:
  /:
    get:
      tags:
      - Unidade Organizacional
      summary: Pesquisar unidades organizacionais
      description: Pesquisa unidades organizacionais (departamentos, institutos, faculdades).
      operationId: list_unidades_api_UnidadeOrganizacional__get
      parameters:
      - name: nome
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por nome (parcial)
          title: Nome
        description: Filtro por nome (parcial)
      - name: _count
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 10
          title: ' Count'
      - name: _offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: ' Offset'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Unidade Organizacional
      summary: Cadastrar unidade organizacional
      description: Cadastra uma nova unidade organizacional.
      operationId: create_new_unidade_api_UnidadeOrganizacional__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnidadeOrganizacionalCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnidadeOrganizacionalResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /{unidade_id}:
    get:
      tags:
      - Unidade Organizacional
      summary: Buscar unidade organizacional por código
      description: 'Retorna os dados de uma unidade organizacional pelo seu código (ex.: ''CIC'').'
      operationId: get_unidade_api_UnidadeOrganizacional__unidade_id__get
      parameters:
      - name: unidade_id
        in: path
        required: true
        schema:
          type: string
          title: Unidade Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    SearchSet:
      properties:
        resourceType:
          type: string
          title: Resourcetype
          description: Tipo do recurso (sempre 'SearchSet')
          default: SearchSet
        total:
          type: integer
          title: Total
          description: Total de registros que satisfazem o filtro
        count:
          type: integer
          title: Count
          description: Quantidade de itens nesta página
        offset:
          type: integer
          title: Offset
          description: Deslocamento aplicado na paginação
        link:
          additionalProperties:
            type: string
          type: object
          title: Link
          description: Links de navegação (self, next, previous)
        items:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Items
          description: Itens da página (cada um com sua chave 'resourceType')
      type: object
      required:
      - total
      - count
      - offset
      - link
      - items
      title: SearchSet
      description: 'Modelo do envelope de listagem padronizado (SearchSet).


        Usado como `response_model` nos endpoints de pesquisa para que os contratos

        OpenAPI documentem explicitamente o formato da resposta (em vez de um schema

        vazio). Os itens são objetos livres, pois cada recurso carrega seu próprio

        conjunto de campos além da chave `resourceType`.'
    UnidadeOrganizacionalCreate:
      properties:
        id:
          type: string
          maxLength: 3
          title: Id
          description: 'Código da unidade (ex.: ''CIC'')'
        nome:
          type: string
          maxLength: 100
          title: Nome
          description: 'Nome da unidade (ex.: ''DEPARTAMENTO DE CIÊNCIA DA COMPUTAÇÃO'')'
      type: object
      required:
      - id
      - nome
      title: UnidadeOrganizacionalCreate
      description: Schema para criação de uma unidade organizacional (SIGAA_UNIDADE).
    UnidadeOrganizacionalResponse:
      properties:
        id:
          type: string
          title: Id
        nome:
          type: string
          title: Nome
      type: object
      required:
      - id
      - nome
      title: UnidadeOrganizacionalResponse
      description: Schema de resposta da unidade organizacional.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
