openapi: 3.1.0
info:
  title: Elegibilidade API
  description: Serviço de Tarefa — verificarElegibilidade (§5.2, §7.1).
  version: 1.0.0
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /api/Tarefa
paths:
  /verificar-elegibilidade:
    post:
      tags:
      - Serviço de Tarefa
      summary: Verificar elegibilidade
      description: Avalia se um aluno pode cursar uma disciplina (§7.1).
      operationId: post_verificar_elegibilidade_api_Tarefa_verificar_elegibilidade_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ElegibilidadeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElegibilidadeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ElegibilidadeRequest:
      properties:
        aluno:
          type: string
          maxLength: 9
          title: Aluno
          description: Matrícula do aluno
        disciplina:
          type: string
          maxLength: 7
          title: Disciplina
          description: 'Código da disciplina (ex.: ''CIC0007'')'
      type: object
      required:
      - aluno
      - disciplina
      title: ElegibilidadeRequest
      description: Par (aluno, disciplina) a avaliar.
    ElegibilidadeResponse:
      properties:
        elegivel:
          type: boolean
          title: Elegivel
        motivos:
          items:
            type: string
          type: array
          title: Motivos
        detalhes:
          additionalProperties: true
          type: object
          title: Detalhes
      type: object
      required:
      - elegivel
      title: ElegibilidadeResponse
      description: Resultado da verificação de elegibilidade (§7.1).
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
