openapi: 3.0.4
info:
  title: Curriculo API
  description: >-
    Serviço de Entidade — Currículo (Estrutura Curricular). Os retornos seguem o modelo
    conceitual do diagrama: 'cargaHoraria' (CargaHoraria) e 'prazo' (Prazo) como objetos de
    valor, 'periodoLetivoVigor' como PeriodoLetivo e os componentes curriculares como
    Disciplina_Curriculo — herança (allOf) de Disciplina, como nos contratos de referência
    do professor. De-para com o banco físico: docs/mapeamento-conceitual-fisico.md.
  version: 1.1.0
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /api/Curriculo
tags:
- name: Curriculo
  description: Estrutura curricular de um curso (modelo SIGAA_CURRICULO)
paths:
  /:
    get:
      tags:
      - Curriculo
      summary: Pesquisar currículos
      description: Pesquisa currículos, opcionalmente por curso (SearchSet).
      operationId: search
      parameters:
      - name: curso
        in: query
        description: "Código do curso (ex.: '6351')"
        required: false
        schema:
          type: string
      - name: _count
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
      - name: _offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
    post:
      tags:
      - Curriculo
      summary: Cadastrar currículo
      description: >-
        Cria um novo currículo (SIGAA_CURRICULO) e o vínculo com o curso, se informado.
        A entrada espelha as colunas físicas; a resposta devolve a representação conceitual.
      operationId: create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurriculoCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Curriculo'
        '400':
          description: Bad request
  /{id}:
    get:
      tags:
      - Curriculo
      summary: Detalhar currículo
      description: >-
        Detalha um currículo — cargaHoraria e prazo como objetos, vigência (PeriodoLetivo)
        e curso vinculado. O id usa a convenção pública do professor ('6351.2').
      operationId: read
      parameters:
      - name: id
        in: path
        description: "id do currículo (ex.: '6351.2')"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Curriculo'
        '404':
          description: Not found
  /{id}/disciplina:
    get:
      tags:
      - Curriculo
      summary: Listar componentes curriculares
      description: >-
        Lista os componentes do currículo como Disciplina_Curriculo (herança de Disciplina):
        cada item carrega os campos herdados (nome, modalidade, cargas horárias) mais 'tipo'
        legível e 'nivel', como no SIGAA-API.sql do professor.
      operationId: searchDisciplina
      parameters:
      - name: id
        in: path
        description: "id do currículo (ex.: '6351.2')"
        required: true
        schema:
          type: string
      - name: nivel
        in: query
        description: Filtro por nível/semestre sugerido (coluna PERIODO)
        required: false
        schema:
          type: integer
      - name: tipo
        in: query
        description: Filtro por tipo ('Obrigatória'/'Optativa'; o código cru 'OBR'/'OPT' é aceito)
        required: false
        schema:
          type: string
          enum:
          - Obrigatória
          - Optativa
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
        '404':
          description: Not found
    post:
      tags:
      - Curriculo
      summary: Vincular disciplina ao currículo
      description: Vincula uma disciplina como componente do currículo (SIGAA_RL_CURRICULO_DISCIPLINA).
      operationId: addDisciplina
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurriculoDisciplinaCreate'
      responses:
        '201':
          description: Created
        '400':
          description: Bad request
  /{id}/disciplina/{disciplina}:
    get:
      tags:
      - Curriculo
      summary: Detalhar um componente curricular
      description: Detalha um componente específico do currículo (Disciplina_Curriculo).
      operationId: readDisciplina
      parameters:
      - name: id
        in: path
        description: "id do currículo (ex.: '6351.2')"
        required: true
        schema:
          type: string
      - name: disciplina
        in: path
        description: "Código da disciplina (ex.: 'ENE0089')"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Disciplina_Curriculo'
        '404':
          description: Not found
components:
  schemas:
    Resource:
      type: object
      required:
      - resourceType
      properties:
        id:
          type: string
          description: id único da instância
        resourceType:
          type: string
      discriminator:
        propertyName: resourceType
        mapping:
          Curriculo: '#/components/schemas/Curriculo'
          Curso: '#/components/schemas/Curso_Short'
          Disciplina: '#/components/schemas/Disciplina'
    PeriodoLetivo:
      type: object
      description: "Derivado do varchar(5) 'AAAAP' do banco (ex.: '20201' → {2020, 1})"
      properties:
        ano:
          type: integer
          example: 2020
        periodo:
          type: integer
          example: 1
    CargaHoraria:
      type: object
      description: >-
        CargaHoraria do Currículo (diagrama). Derivada das colunas CARGA_HORARIA_* de
        SIGAA_CURRICULO; 'obrigatoriaAula', 'obrigatoriaOrientacao' e 'minimaPeriodo' não têm
        coluna no DDL do professor → null (mapeamento, Seção 2.3).
      properties:
        totalMinima:
          type: integer
          example: 3750
        obrigatoriaAula:
          type: integer
          nullable: true
          example: null
        obrigatoriaOrientacao:
          type: integer
          nullable: true
          example: null
        obrigatoriaTotal:
          type: integer
          example: 2640
        optativaMinima:
          type: integer
          example: 1110
        maximaEletivos:
          type: integer
          example: 360
        maximaPeriodo:
          type: integer
          example: 450
        minimaPeriodo:
          type: integer
          nullable: true
          example: null
    Prazo:
      type: object
      description: 'Prazo em períodos ← MIN_PERIODOS / NUM_PERIODOS / MAX_PERIODOS'
      properties:
        minimo:
          type: integer
          example: 10
        medio:
          type: integer
          example: 10
        maximo:
          type: integer
          example: 20
    CargaHoraria_Disciplina:
      type: object
      description: CargaHoraria da Disciplina (teórica/prática/extensionista)
      properties:
        teorica:
          type: integer
          nullable: true
        pratica:
          type: integer
          nullable: true
        extensionista:
          type: integer
          nullable: true
    Curso_Short:
      allOf:
      - $ref: '#/components/schemas/Resource'
      - type: object
        properties:
          id:
            type: string
            example: 6351
          codigo:
            type: string
            example: 6351
          nome:
            type: string
            example: ENGENHARIA DE REDES DE COMUNICAÇÃO
    Curriculo:
      allOf:
      - $ref: '#/components/schemas/Resource'
      - type: object
        properties:
          id:
            type: string
            example: 6351.2
          codigo:
            type: string
            example: 6351.2
          status:
            type: string
            enum:
            - ativo
            - inativo
            description: Domínio conceitual do diagrama ← STATUS 'A'/'I'
          periodoLetivoVigor:
            $ref: '#/components/schemas/PeriodoLetivo'
          cargaHoraria:
            $ref: '#/components/schemas/CargaHoraria'
          prazo:
            $ref: '#/components/schemas/Prazo'
          curso:
            $ref: '#/components/schemas/Curso_Short'
    Disciplina:
      allOf:
      - $ref: '#/components/schemas/Resource'
      - type: object
        properties:
          id:
            type: string
            example: ENE0276
          codigo:
            type: string
            example: ENE0276
          nome:
            type: string
            example: METODOLOGIA E DESENVOLVIMENTO DE SOFTWARE
          modalidade:
            type: string
            example: Presencial
          cargaHorariaTotal:
            type: integer
            example: 60
          cargaHorariaPresencial:
            $ref: '#/components/schemas/CargaHoraria_Disciplina'
          cargaHorariaEad:
            $ref: '#/components/schemas/CargaHoraria_Disciplina'
          unidadeOrganizacional:
            $ref: '#/components/schemas/Resource'
    Disciplina_Curriculo:
      description: >-
        Componente curricular — especialização (herança/allOf) de Disciplina, com os campos
        do contexto do currículo, como no modelo conceitual.
      allOf:
      - $ref: '#/components/schemas/Disciplina'
      - type: object
        properties:
          tipo:
            type: string
            enum:
            - Obrigatória
            - Optativa
            description: Rótulo legível ← TIPO ('OBR'/'OPT'), como no SIGAA-API.sql
          nivel:
            type: integer
            nullable: true
            description: Nível/semestre sugerido ← coluna PERIODO
    CurriculoCreate:
      type: object
      description: 'Entrada de criação: espelha as colunas físicas de SIGAA_CURRICULO.'
      required:
      - id
      - periodo_letivo_vigor
      - carga_horaria_minima_total
      - carga_horaria_minima_opt
      - carga_horaria_obr
      - carga_horaria_eletiva_max
      - carga_horaria_max_periodo
      - num_periodos
      - min_periodos
      - max_periodos
      properties:
        id:
          type: string
          maxLength: 7
          example: 6351/2
        status:
          type: string
          maxLength: 1
          default: A
        periodo_letivo_vigor:
          type: string
          maxLength: 5
          example: '20201'
        carga_horaria_minima_total:
          type: integer
          minimum: 0
        carga_horaria_minima_opt:
          type: integer
          minimum: 0
        carga_horaria_obr:
          type: integer
          minimum: 0
        carga_horaria_eletiva_max:
          type: integer
          minimum: 0
        carga_horaria_max_periodo:
          type: integer
          minimum: 0
        num_periodos:
          type: integer
          minimum: 0
        min_periodos:
          type: integer
          minimum: 0
        max_periodos:
          type: integer
          minimum: 0
        curso:
          type: string
          maxLength: 4
          description: Curso a vincular (SIGAA_RL_CURRICULO_CURSO)
    CurriculoDisciplinaCreate:
      type: object
      required:
      - disciplina
      - tipo
      properties:
        disciplina:
          type: string
          maxLength: 7
          example: CIC0007
        periodo:
          type: integer
          minimum: 0
          description: Nível/semestre sugerido
        tipo:
          type: string
          maxLength: 15
          description: "'OBR' (obrigatória) ou 'OPT' (optativa)"
    SearchSet:
      type: object
      required:
      - total
      - link
      properties:
        resourceType:
          type: string
          default: SearchSet
        total:
          type: integer
        count:
          type: integer
        offset:
          type: integer
        link:
          type: object
          required:
          - self
          properties:
            self:
              type: string
            next:
              type: string
            previous:
              type: string
        items:
          type: array
          items:
            anyOf:
            - $ref: '#/components/schemas/Curriculo'
            - $ref: '#/components/schemas/Disciplina_Curriculo'
