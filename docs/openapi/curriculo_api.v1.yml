openapi: 3.1.0
info:
  title: Currículo API
  description: 'Serviço de Entidade — Currículo/Estrutura Curricular (modelo SIGAA: SIGAA_CURRICULO).'
  version: 1.0.0
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /api/Curriculo
paths:
  /:
    post:
      tags:
      - Currículos
      summary: Create
      description: Cria um novo currículo (SIGAA_CURRICULO) e o vínculo com o curso, se informado.
      operationId: create_api_Curriculo__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurriculoCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurriculoResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Currículos
      summary: List Curriculos
      description: Pesquisa currículos, opcionalmente por curso (SearchSet).
      operationId: list_curriculos_api_Curriculo__get
      parameters:
      - name: curso
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por código de curso
          title: Curso
        description: Filtro por código de curso
      - name: _count
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 10
          title: ' Count'
      - name: _offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: ' Offset'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /{id}:
    get:
      tags:
      - Currículos
      summary: Read
      description: 'Detalha um currículo: cargas horárias, quantidade de períodos e vigência.'
      operationId: read_api_Curriculo__id__get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /{id}/disciplinas:
    get:
      tags:
      - Currículos
      summary: List Disciplinas
      description: 'Lista as disciplinas (componentes curriculares) de um currículo.
        Segue o SIGAA-API.sql do professor: filtra por ''nivel'' (coluna PERIODO) e por
        ''tipo'', e devolve o tipo com o rótulo legível.'
      operationId: list_disciplinas_api_Curriculo__id__disciplinas_get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      - name: nivel
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Filtro por nível/semestre sugerido (coluna PERIODO)
          title: Nivel
        description: Filtro por nível/semestre sugerido (coluna PERIODO)
      - name: tipo
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por tipo ('Obrigatória'/'Optativa' ou 'OBR'/'OPT')
          title: Tipo
        description: Filtro por tipo ('Obrigatória'/'Optativa' ou 'OBR'/'OPT')
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Currículos
      summary: Add Disciplina To Curriculo
      description: Vincula uma disciplina como componente do currículo (SIGAA_RL_CURRICULO_DISCIPLINA).
      operationId: add_disciplina_to_curriculo_api_Curriculo__id__disciplinas_post
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurriculoDisciplinaCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    CurriculoCreate:
      properties:
        id:
          type: string
          maxLength: 7
          title: Id
          description: 'Código do currículo (ex.: ''6351/2'')'
        status:
          anyOf:
          - type: string
            maxLength: 1
          - type: 'null'
          title: Status
          description: 'Status (ex.: ''A'')'
          default: A
        periodo_letivo_vigor:
          type: string
          maxLength: 5
          title: Periodo Letivo Vigor
          description: 'Período de vigor (ex.: ''20182'')'
        carga_horaria_minima_total:
          type: integer
          minimum: 0.0
          title: Carga Horaria Minima Total
        carga_horaria_minima_opt:
          type: integer
          minimum: 0.0
          title: Carga Horaria Minima Opt
        carga_horaria_obr:
          type: integer
          minimum: 0.0
          title: Carga Horaria Obr
        carga_horaria_eletiva_max:
          type: integer
          minimum: 0.0
          title: Carga Horaria Eletiva Max
        carga_horaria_max_periodo:
          type: integer
          minimum: 0.0
          title: Carga Horaria Max Periodo
        num_periodos:
          type: integer
          minimum: 0.0
          title: Num Periodos
        min_periodos:
          type: integer
          minimum: 0.0
          title: Min Periodos
        max_periodos:
          type: integer
          minimum: 0.0
          title: Max Periodos
        curso:
          anyOf:
          - type: string
            maxLength: 4
          - type: 'null'
          title: Curso
          description: Curso a vincular (SIGAA_RL_CURRICULO_CURSO)
      type: object
      required:
      - id
      - periodo_letivo_vigor
      - carga_horaria_minima_total
      - carga_horaria_minima_opt
      - carga_horaria_obr
      - carga_horaria_eletiva_max
      - carga_horaria_max_periodo
      - num_periodos
      - min_periodos
      - max_periodos
      title: CurriculoCreate
      description: Schema para criação de um currículo (SIGAA_CURRICULO).
    CurriculoDisciplinaCreate:
      properties:
        disciplina:
          type: string
          maxLength: 7
          title: Disciplina
          description: 'Código da disciplina (ex.: ''CIC0007'')'
        periodo:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Periodo
          description: Nível/semestre sugerido
        tipo:
          type: string
          maxLength: 15
          title: Tipo
          description: '''OBR'' (obrigatória) ou ''OPT'' (optativa)'
      type: object
      required:
      - disciplina
      - tipo
      title: CurriculoDisciplinaCreate
      description: Schema para vincular uma disciplina ao currículo (SIGAA_RL_CURRICULO_DISCIPLINA).
    CurriculoResponse:
      properties:
        id:
          type: string
          title: Id
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
        periodo_letivo_vigor:
          type: string
          title: Periodo Letivo Vigor
      type: object
      required:
      - id
      - periodo_letivo_vigor
      title: CurriculoResponse
      description: Schema de resposta do currículo.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    SearchSet:
      properties:
        resourceType:
          type: string
          title: Resourcetype
          description: Tipo do recurso (sempre 'SearchSet')
          default: SearchSet
        total:
          type: integer
          title: Total
          description: Total de registros que satisfazem o filtro
        count:
          type: integer
          title: Count
          description: Quantidade de itens nesta página
        offset:
          type: integer
          title: Offset
          description: Deslocamento aplicado na paginação
        link:
          additionalProperties:
            type: string
          type: object
          title: Link
          description: Links de navegação (self, next, previous)
        items:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Items
          description: Itens da página (cada um com sua chave 'resourceType')
      type: object
      required:
      - total
      - count
      - offset
      - link
      - items
      title: SearchSet
      description: 'Modelo do envelope de listagem padronizado (SearchSet).


        Usado como `response_model` nos endpoints de pesquisa para que os contratos

        OpenAPI documentem explicitamente o formato da resposta (em vez de um schema

        vazio). Os itens são objetos livres, pois cada recurso carrega seu próprio

        conjunto de campos além da chave `resourceType`.'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
