openapi: 3.1.0
info:
  title: Serviço de Entidade - Aluno API
  description: Gestão de Alunos no Sistema de Matrícula
  contact:
    name: Vicente Jr. (juniorvf@gmail.com / vicente.junior@aluno.unb.br)
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /alunos:
    get:
      summary: Lista todos os alunos matriculados ou ex-alunos
      operationId: listarAlunos
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas/aluno.v1.json'
    post:
      summary: Registra um novo aluno
      operationId: criarAluno
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/aluno.v1.json'
      responses:
        "201":
          description: Aluno cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: '../schemas/aluno.v1.json'
        "400":
          description: Erro de negócio (Ex. matrícula já existente / curso inválido)
          content:
            application/json:
              schema:
                $ref: '../schemas/erro_api.v1.json'
        "422":
          description: Erro de validação de dados
          content:
            application/json:
              schema:
                $ref: '../schemas/erro_api.v1.json'

  /alunos/{id}:
    get:
      summary: Obtém os dados completos de um aluno
      operationId: obterAluno
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '../schemas/aluno.v1.json'
        "404":
          description: Aluno não encontrado
          content:
            application/json:
              schema:
                $ref: '../schemas/erro_api.v1.json'
    put:
      summary: Edita dados básicos ou atualiza IRA do aluno
      operationId: atualizarAluno
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/aluno.v1.json'
      responses:
        "200":
          description: Atualização salva
          content:
            application/json:
              schema:
                $ref: '../schemas/aluno.v1.json'
        "400":
          description: Erro de negócio ao atualizar
          content:
            application/json:
              schema:
                $ref: '../schemas/erro_api.v1.json'
        "404":
          description: Aluno não encontrado
          content:
            application/json:
              schema:
                $ref: '../schemas/erro_api.v1.json'
