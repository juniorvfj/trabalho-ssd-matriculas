openapi: 3.1.0
info:
  title: Aluno API
  description: 'Serviço de Entidade — Aluno (modelo SIGAA: SIGAA_ALUNO + SIGAA_RL_ALUNO_CURSO).'
  version: 1.0.0
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /api/Aluno
paths:
  /:
    get:
      tags:
      - Aluno
      summary: Pesquisar alunos
      description: Pesquisa alunos por nome, curso e/ou período de ingresso (SearchSet).
      operationId: search_api_Aluno__get
      parameters:
      - name: nome
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por nome (parcial)
          title: Nome
        description: Filtro por nome (parcial)
      - name: curso
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por código de curso
          title: Curso
        description: Filtro por código de curso
      - name: periodoIngresso
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filtro por período de ingresso (ex.: ''20182'')'
          title: Periodoingresso
        description: 'Filtro por período de ingresso (ex.: ''20182'')'
      - name: _count
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 10
          title: ' Count'
      - name: _offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: ' Offset'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Aluno
      summary: Cadastrar aluno
      description: Cadastra um aluno e seu vínculo de curso (SIGAA_ALUNO + SIGAA_RL_ALUNO_CURSO).
      operationId: create_api_Aluno__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlunoCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlunoResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /{id}:
    get:
      tags:
      - Aluno
      summary: Buscar aluno por matrícula
      description: Retorna os dados do aluno, seu curso, currículo, IRA e período de ingresso.
      operationId: read_api_Aluno__id__get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Aluno'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    Resource:
      type: object
      required:
      - resourceType
      properties:
        id:
          type: string
          description: id único da instância
        resourceType:
          type: string
      discriminator:
        propertyName: resourceType
        mapping:
          Aluno: '#/components/schemas/Aluno'
          Curso: '#/components/schemas/Curso_Short'
          Curriculo: '#/components/schemas/Curriculo_Short'
    PeriodoLetivo:
      type: object
      description: "Derivado do varchar(5) 'AAAAP' do banco (ex.: '20182' → {2018, 2})"
      properties:
        ano:
          type: integer
          example: 2018
        periodo:
          type: integer
          example: 2
    Curso_Short:
      allOf:
      - $ref: '#/components/schemas/Resource'
      - type: object
        properties:
          id:
            type: string
            example: 6351
          codigo:
            type: string
            example: 6351
          nome:
            type: string
            example: ENGENHARIA DE REDES DE COMUNICAÇÃO
    Curriculo_Short:
      allOf:
      - $ref: '#/components/schemas/Resource'
      - type: object
        properties:
          id:
            type: string
            example: 6351.2
          codigo:
            type: string
            example: 6351.2
    Aluno:
      description: >-
        Aluno no modelo conceitual (padrão Aluno.yml do professor): periodoIngresso como
        PeriodoLetivo e curso/curriculo como referências _Short.
      allOf:
      - $ref: '#/components/schemas/Resource'
      - type: object
        properties:
          id:
            type: string
            example: 180012345
          matricula:
            type: string
            example: 180012345
          nome:
            type: string
            example: ADA LOVELACE
          ira:
            type: number
            example: 4.76
          periodoIngresso:
            $ref: '#/components/schemas/PeriodoLetivo'
          curso:
            $ref: '#/components/schemas/Curso_Short'
          curriculo:
            $ref: '#/components/schemas/Curriculo_Short'
    AlunoCreate:
      properties:
        matricula:
          type: string
          pattern: ^[0-9]{9}$
          title: Matricula
          description: Matrícula (9 dígitos)
        nome:
          type: string
          maxLength: 80
          title: Nome
          description: Nome do aluno
        curso:
          type: string
          maxLength: 4
          title: Curso
          description: 'Código do curso (ex.: ''6351'')'
        curriculo:
          type: string
          maxLength: 7
          title: Curriculo
          description: 'Código do currículo (ex.: ''6351/2'')'
        data_registro:
          type: string
          format: date
          title: Data Registro
          description: Data de registro no curso (YYYY-MM-DD)
        periodo_letivo_registro:
          type: string
          maxLength: 5
          title: Periodo Letivo Registro
          description: 'Período de ingresso (ex.: ''20182'')'
        status:
          anyOf:
          - type: string
            maxLength: 1
          - type: 'null'
          title: Status
          description: 'Status do vínculo (ex.: ''A'')'
          default: A
        ira:
          anyOf:
          - type: number
            maximum: 5.0
            minimum: 0.0
          - type: 'null'
          title: Ira
          description: Índice de Rendimento Acadêmico
      type: object
      required:
      - matricula
      - nome
      - curso
      - curriculo
      - data_registro
      - periodo_letivo_registro
      title: AlunoCreate
      description: 'Schema para criação de um aluno já com seu vínculo de curso.

        Cria uma linha em SIGAA_ALUNO e outra em SIGAA_RL_ALUNO_CURSO.'
    AlunoResponse:
      properties:
        matricula:
          type: string
          title: Matricula
        nome:
          type: string
          title: Nome
      type: object
      required:
      - matricula
      - nome
      title: AlunoResponse
      description: Schema de resposta resumida do aluno.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    SearchSet:
      properties:
        resourceType:
          type: string
          title: Resourcetype
          description: Tipo do recurso (sempre 'SearchSet')
          default: SearchSet
        total:
          type: integer
          title: Total
          description: Total de registros que satisfazem o filtro
        count:
          type: integer
          title: Count
          description: Quantidade de itens nesta página
        offset:
          type: integer
          title: Offset
          description: Deslocamento aplicado na paginação
        link:
          additionalProperties:
            type: string
          type: object
          title: Link
          description: Links de navegação (self, next, previous)
        items:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Items
          description: Itens da página (cada um com sua chave 'resourceType')
      type: object
      required:
      - total
      - count
      - offset
      - link
      - items
      title: SearchSet
      description: 'Modelo do envelope de listagem padronizado (SearchSet).


        Usado como `response_model` nos endpoints de pesquisa para que os contratos

        OpenAPI documentem explicitamente o formato da resposta (em vez de um schema

        vazio). Os itens são objetos livres, pois cada recurso carrega seu próprio

        conjunto de campos além da chave `resourceType`.'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
