openapi: 3.0.4
info:
  title: Disciplina API
  description: >-
    Serviço de Entidade — Disciplina. Os retornos seguem o modelo conceitual do diagrama
    (docs/diagrams/Modelo de Entidades): cargaHorariaTotal derivada (teórica + prática, como
    no SIGAA-API.sql) e as associações cargaHorariaPresencial/cargaHorariaEad como objetos
    CargaHoraria. De-para com o banco físico: docs/mapeamento-conceitual-fisico.md.
  version: 1.1.0
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /api/Disciplina
tags:
- name: Disciplina
  description: Disciplina de graduação (modelo SIGAA_DISCIPLINA + SIGAA_PREREQ)
paths:
  /:
    get:
      tags:
      - Disciplina
      summary: Pesquisar disciplinas
      description: Pesquisa disciplinas por nome/modalidade/unidade (SearchSet).
      operationId: search
      parameters:
      - name: nome
        in: query
        description: Nome (ou parte do nome) da disciplina
        required: false
        schema:
          type: string
      - name: modalidade
        in: query
        description: "Modalidade (ex.: 'Presencial')"
        required: false
        schema:
          type: string
      - name: unidade
        in: query
        description: "Código da unidade organizacional responsável (ex.: 'ENE')"
        required: false
        schema:
          type: string
      - name: _count
        in: query
        description: Quantidade de registros retornados
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
      - name: _offset
        in: query
        description: Deslocamento da paginação
        required: false
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
    post:
      tags:
      - Disciplina
      summary: Cadastrar disciplina
      description: >-
        Cria uma nova disciplina (SIGAA_DISCIPLINA). A entrada espelha as colunas físicas;
        a resposta devolve a representação conceitual.
      operationId: create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisciplinaCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Disciplina'
        '400':
          description: Bad request
  /{id}:
    get:
      tags:
      - Disciplina
      summary: Buscar disciplina por código
      description: >-
        Retorna a disciplina no modelo conceitual — cargas horárias como objetos CargaHoraria
        e a auto-associação preRequisito (0..*).
      operationId: read
      parameters:
      - name: id
        in: path
        description: "Código da disciplina (ex.: 'ENE0276')"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Disciplina_Detalhe'
        '404':
          description: Not found
  /{id}/prerequisitos:
    post:
      tags:
      - Disciplina
      summary: Vincular pré-requisito
      description: Vincula uma disciplina como pré-requisito da disciplina informada (SIGAA_PREREQ).
      operationId: addPrerequisito
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrerequisitoCreate'
      responses:
        '201':
          description: Created
        '400':
          description: Bad request
components:
  schemas:
    Resource:
      type: object
      required:
      - resourceType
      properties:
        id:
          type: string
          description: id único da instância
        resourceType:
          type: string
      discriminator:
        propertyName: resourceType
        mapping:
          Disciplina: '#/components/schemas/Disciplina'
          UnidadeOrganizacional: '#/components/schemas/UnidadeOrganizacional_Short'
    CargaHoraria:
      type: object
      description: >-
        CargaHoraria da Disciplina (diagrama). Derivada das colunas CARGA_HORARIA_TEORICA e
        CARGA_HORARIA_PRATICA; 'extensionista' não tem coluna no DDL do professor → null.
      properties:
        teorica:
          type: integer
          nullable: true
          example: 30
        pratica:
          type: integer
          nullable: true
          example: 30
        extensionista:
          type: integer
          nullable: true
          example: null
    UnidadeOrganizacional_Short:
      allOf:
      - $ref: '#/components/schemas/Resource'
      - type: object
        properties:
          id:
            type: string
            example: ENE
          nome:
            type: string
            nullable: true
            example: DEPARTAMENTO DE ENGENHARIA ELETRICA
    Disciplina:
      allOf:
      - $ref: '#/components/schemas/Resource'
      - type: object
        properties:
          id:
            type: string
            example: ENE0276
          codigo:
            type: string
            example: ENE0276
          nome:
            type: string
            example: METODOLOGIA E DESENVOLVIMENTO DE SOFTWARE
          modalidade:
            type: string
            example: Presencial
          cargaHorariaTotal:
            type: integer
            description: 'Derivado: teórica + prática (SIGAA-API.sql, l. 10)'
            example: 60
          cargaHorariaPresencial:
            $ref: '#/components/schemas/CargaHoraria'
          cargaHorariaEad:
            $ref: '#/components/schemas/CargaHoraria'
          unidadeOrganizacional:
            $ref: '#/components/schemas/UnidadeOrganizacional_Short'
    Disciplina_Detalhe:
      description: Detalhe da disciplina — herda Disciplina e acrescenta os pré-requisitos.
      allOf:
      - $ref: '#/components/schemas/Disciplina'
      - type: object
        properties:
          preRequisito:
            type: array
            items:
              $ref: '#/components/schemas/Disciplina'
    DisciplinaCreate:
      type: object
      description: 'Entrada de criação: espelha as colunas físicas de SIGAA_DISCIPLINA.'
      required:
      - id
      - unidade
      properties:
        id:
          type: string
          maxLength: 7
          example: CIC0007
        nome:
          type: string
          maxLength: 100
        modalidade:
          type: string
          maxLength: 50
          example: Presencial
        carga_horaria_teorica:
          type: integer
          minimum: 0
        carga_horaria_pratica:
          type: integer
          minimum: 0
        carga_horaria:
          type: integer
          minimum: 0
          description: >-
            Coluna extra do projeto (exemplo didático de evolução de schema); quando preenchida,
            prevalece na derivação de cargaHorariaTotal.
        unidade:
          type: string
          maxLength: 3
          example: CIC
    PrerequisitoCreate:
      type: object
      required:
      - disciplina_requerido
      properties:
        disciplina_requerido:
          type: string
          maxLength: 7
          description: Código da disciplina exigida como pré-requisito
    SearchSet:
      type: object
      required:
      - total
      - link
      properties:
        resourceType:
          type: string
          default: SearchSet
        total:
          type: integer
        count:
          type: integer
        offset:
          type: integer
        link:
          type: object
          required:
          - self
          properties:
            self:
              type: string
            next:
              type: string
            previous:
              type: string
        items:
          type: array
          items:
            anyOf:
            - $ref: '#/components/schemas/Disciplina'
