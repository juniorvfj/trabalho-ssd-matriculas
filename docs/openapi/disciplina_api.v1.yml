openapi: 3.1.0
info:
  title: Disciplina API
  description: 'Serviço de Entidade — Disciplina (modelo SIGAA: SIGAA_DISCIPLINA + SIGAA_PREREQ).'
  version: 1.0.0
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /api/Disciplina
paths:
  /:
    get:
      tags:
      - Disciplina
      summary: Pesquisar disciplinas
      description: Pesquisa disciplinas por nome/modalidade/unidade (SearchSet).
      operationId: get_all_disciplinas_api_Disciplina__get
      parameters:
      - name: nome
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por nome (parcial)
          title: Nome
        description: Filtro por nome (parcial)
      - name: modalidade
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por modalidade
          title: Modalidade
        description: Filtro por modalidade
      - name: unidade
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por código de unidade organizacional
          title: Unidade
        description: Filtro por código de unidade organizacional
      - name: _count
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 10
          title: ' Count'
      - name: _offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: ' Offset'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Disciplina
      summary: Cadastrar disciplina
      description: Cria uma nova disciplina (SIGAA_DISCIPLINA).
      operationId: post_disciplina_api_Disciplina__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisciplinaCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisciplinaResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /{id}:
    get:
      tags:
      - Disciplina
      summary: Buscar disciplina por código
      description: Retorna os detalhes de uma disciplina, cargas horárias e pré-requisitos.
      operationId: get_disciplina_api_Disciplina__id__get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /{id}/prerequisitos:
    post:
      tags:
      - Disciplina
      summary: Vincular pré-requisito
      description: Vincula uma disciplina como pré-requisito da disciplina informada (SIGAA_PREREQ).
      operationId: post_prerequisito_api_Disciplina__id__prerequisitos_post
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrerequisitoCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    DisciplinaCreate:
      properties:
        id:
          type: string
          maxLength: 7
          title: Id
          description: 'Código da disciplina (ex.: ''CIC0007'')'
        nome:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Nome
          description: Nome da disciplina
        modalidade:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
          title: Modalidade
          description: Modalidade
        carga_horaria_teorica:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Carga Horaria Teorica
          description: Carga horária teórica
        carga_horaria_pratica:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Carga Horaria Pratica
          description: Carga horária prática
        carga_horaria:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Carga Horaria
          description: Carga horária total da disciplina
        unidade:
          type: string
          maxLength: 3
          title: Unidade
          description: 'Código da unidade organizacional responsável (ex.: ''CIC'')'
      type: object
      required:
      - id
      - unidade
      title: DisciplinaCreate
      description: Schema para criação de uma disciplina (SIGAA_DISCIPLINA).
    DisciplinaResponse:
      properties:
        id:
          type: string
          title: Id
        nome:
          anyOf:
          - type: string
          - type: 'null'
          title: Nome
        modalidade:
          anyOf:
          - type: string
          - type: 'null'
          title: Modalidade
        carga_horaria_teorica:
          anyOf:
          - type: integer
          - type: 'null'
          title: Carga Horaria Teorica
        carga_horaria_pratica:
          anyOf:
          - type: integer
          - type: 'null'
          title: Carga Horaria Pratica
        carga_horaria:
          anyOf:
          - type: integer
          - type: 'null'
          title: Carga Horaria
        unidade:
          type: string
          title: Unidade
      type: object
      required:
      - id
      - unidade
      title: DisciplinaResponse
      description: Schema de resposta da disciplina.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    PrerequisitoCreate:
      properties:
        disciplina_requerido:
          type: string
          maxLength: 7
          title: Disciplina Requerido
          description: Código da disciplina exigida como pré-requisito
      type: object
      required:
      - disciplina_requerido
      title: PrerequisitoCreate
      description: Schema para vincular um pré-requisito (SIGAA_PREREQ).
    SearchSet:
      properties:
        resourceType:
          type: string
          title: Resourcetype
          description: Tipo do recurso (sempre 'SearchSet')
          default: SearchSet
        total:
          type: integer
          title: Total
          description: Total de registros que satisfazem o filtro
        count:
          type: integer
          title: Count
          description: Quantidade de itens nesta página
        offset:
          type: integer
          title: Offset
          description: Deslocamento aplicado na paginação
        link:
          additionalProperties:
            type: string
          type: object
          title: Link
          description: Links de navegação (self, next, previous)
        items:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Items
          description: Itens da página (cada um com sua chave 'resourceType')
      type: object
      required:
      - total
      - count
      - offset
      - link
      - items
      title: SearchSet
      description: 'Modelo do envelope de listagem padronizado (SearchSet).


        Usado como `response_model` nos endpoints de pesquisa para que os contratos

        OpenAPI documentem explicitamente o formato da resposta (em vez de um schema

        vazio). Os itens são objetos livres, pois cada recurso carrega seu próprio

        conjunto de campos além da chave `resourceType`.'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
