openapi: 3.1.0
info:
  title: SSD Vicente - Matrícula (Disciplinas)
  description: Módulo de Disciplinas — gerado automaticamente da API em execução.
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0

servers:
  - url: /api/Disciplina

security:
  - OAuth2PasswordBearer: []

paths:
  /:
    get:
      tags:
        - Disciplinas
      summary: Get All Disciplinas
      description: Retorna a lista completa de disciplinas cadastradas na base.
      operationId: get_all_disciplinas_api_v1_disciplinas__get
      security:
        - OAuth2PasswordBearer: []
      parameters:
        - name: _count
          in: query
          description: Quantidade de registros a retornar
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: _offset
          in: query
          description: Quantidade de registros a pular (paginação)
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Lista de disciplinas retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'

    post:
      tags:
        - Disciplinas
      summary: Post Disciplina
      description: |
        Cria uma nova disciplina.
        Lança erro caso o ID do curso vinculado seja inválido ou código já exista.
      operationId: post_disciplina_api_v1_disciplinas__post
      security:
        - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisciplinaCreate'
            example:
              codigo: CIC0004
              nome: Estruturas de Dados
              creditos: 6
              carga_horaria: 90
              curso_id: 1
              ativa: true
      responses:
        '201':
          description: Disciplina criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisciplinaResponse'
        '422':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'

  /{id}:
    get:
      tags:
        - Disciplinas
      summary: Get Disciplina
      description: Recupera as informações detalhadas de uma disciplina pelo seu ID.
      operationId: get_disciplina_api_v1_disciplinas__id__get
      security:
        - OAuth2PasswordBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            title: Id
      responses:
        '200':
          description: Disciplina encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisciplinaResponse'
        '404':
          description: Disciplina não encontrada
        '422':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'

components:
  securitySchemes:
    OAuth2PasswordBearer:
      type: oauth2
      flows:
        password:
          tokenUrl: /api/v1/auth/login
          scopes: {}

  schemas:

    Resource:
      type: object
      required:
        - resourceType
      properties:
        id:
          type: string
          description: id único da instânica
        resourceType:
          type: string
        lastUpdated:
          type: string
          format: date-time
      discriminator:
        propertyName: resourceType
        mapping:
          Aluno: '#/components/schemas/Aluno'
          Curso: '#/components/schemas/Curso'
          Curriculo: '#/components/schemas/Curriculo'
          Disciplina: '#/components/schemas/Disciplina'
          Docente: '#/components/schemas/Docente'
          HistoricoAcademico: '#/components/schemas/HistoricoAcademico'
          Matricula: '#/components/schemas/Matricula'
          Turma: '#/components/schemas/Turma'
          UnidadeOrganizacional: '#/components/schemas/UnidadeOrganizacional'
    DisciplinaCreate:
      type: object
      required:
        - codigo
        - nome
        - creditos
        - carga_horaria
        - curso_id
      description: Schema para a criação de uma Disciplina.
      properties:
        codigo:
          type: string
          maxLength: 20
          title: Codigo
          description: "Código da disciplina (Ex: CIC0001)"
        nome:
          type: string
          maxLength: 150
          title: Nome
          description: Nome da disciplina
        modalidade:
          anyOf:
            - type: string
              maxLength: 50
            - type: 'null'
          title: Modalidade
          description: "Modalidade (Ex: Presencial, EAD, Híbrida)"
        creditos:
          type: integer
          exclusiveMinimum: 0
          title: Creditos
          description: Quantidade de créditos
        carga_horaria:
          type: integer
          exclusiveMinimum: 0
          title: Carga Horaria
          description: Carga horária total da disciplina
        carga_horaria_teorica:
          type: integer
          minimum: 0
          default: 0
          title: Carga Horaria Teorica
          description: Carga horária teórica
        carga_horaria_pratica:
          type: integer
          minimum: 0
          default: 0
          title: Carga Horaria Pratica
          description: Carga horária prática
        carga_horaria_extensionista:
          type: integer
          minimum: 0
          default: 0
          title: Carga Horaria Extensionista
          description: Carga horária extensionista
        curso_id:
          type: integer
          title: Curso Id
          description: ID do curso ao qual a disciplina pertence
        ativa:
          type: boolean
          title: Ativa
          description: Indica se a disciplina está ativa
          default: true

    DisciplinaResponse:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
      required:
        - codigo
        - nome
        - creditos
        - carga_horaria
        - curso_id
        - id
      description: Schema de resposta, contendo o ID auto-gerado.
      properties:
        id:
          type: integer
          title: Id
        codigo:
          type: string
          maxLength: 20
          title: Codigo
          description: "Código da disciplina (Ex: CIC0001)"
        nome:
          type: string
          maxLength: 150
          title: Nome
          description: Nome da disciplina
        modalidade:
          anyOf:
            - type: string
              maxLength: 50
            - type: 'null'
          title: Modalidade
          description: "Modalidade (Ex: Presencial, EAD, Híbrida)"
        creditos:
          type: integer
          exclusiveMinimum: 0
          title: Creditos
          description: Quantidade de créditos
        carga_horaria:
          type: integer
          exclusiveMinimum: 0
          title: Carga Horaria
          description: Carga horária total da disciplina
        carga_horaria_teorica:
          type: integer
          minimum: 0
          default: 0
          title: Carga Horaria Teorica
          description: Carga horária teórica
        carga_horaria_pratica:
          type: integer
          minimum: 0
          default: 0
          title: Carga Horaria Pratica
          description: Carga horária prática
        carga_horaria_extensionista:
          type: integer
          minimum: 0
          default: 0
          title: Carga Horaria Extensionista
          description: Carga horária extensionista
        curso_id:
          type: integer
          title: Curso Id
          description: ID do curso ao qual a disciplina pertence
        ativa:
          type: boolean
          title: Ativa
          description: Indica se a disciplina está ativa
          default: true

    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'

    ValidationError:
      type: object
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          items:
            anyOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string


    SearchSet:
      type: object  
      required:
        - total
        - link
      properties:
        total:
          type: integer 
        count:
          type: integer
        offset:
          type: integer     
        link:
          type: object
          required:
            - self
          properties:
            self:
              type: string
            next:
              type: string
            previous:
              type: string
        items:
          type: array
          items:
            anyOf:
            - $ref: '#/components/schemas/AlunoResponse'
            - $ref: '#/components/schemas/CursoResponse'
            - $ref: '#/components/schemas/CurriculoResponse'
            - $ref: '#/components/schemas/DisciplinaResponse'
            - $ref: '#/components/schemas/DocenteResponse'
            - $ref: '#/components/schemas/HistoricoAcademicoResponse'
            - $ref: '#/components/schemas/MatriculaResponse'
            - $ref: '#/components/schemas/TurmaResponse'
            - $ref: '#/components/schemas/UnidadeOrganizacionalResponse'
