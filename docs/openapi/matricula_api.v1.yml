openapi: 3.1.0
info:
  title: Matrícula API
  description: 'Serviço de Entidade e Processamento — Matrícula (modelo SIGAA: SIGAA_MATRICULA).'
  version: 1.0.0
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /api/Matricula
paths:
  /:
    get:
      tags:
      - Matrícula
      summary: Pesquisar matrículas
      description: Pesquisa matrículas de um período letivo; ao menos aluno ou turma deve ser informado.
      operationId: search_api_Matricula__get
      parameters:
      - name: periodoLetivo
        in: query
        required: true
        schema:
          type: string
          description: 'Período letivo (obrigatório, ex.: ''20182'')'
          title: Periodoletivo
        description: 'Período letivo (obrigatório, ex.: ''20182'')'
      - name: aluno
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Matrícula do aluno
          title: Aluno
        description: Matrícula do aluno
      - name: turma
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: ID da turma
          title: Turma
        description: ID da turma
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Código de status (ex.: ''MAT'')'
          title: Status
        description: 'Código de status (ex.: ''MAT'')'
      - name: _count
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 10
          title: ' Count'
      - name: _offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: ' Offset'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Matrícula
      summary: Criar pedidos de matrícula (lote)
      description: Cria um lote de pedidos de matrícula (status 'PND').
      operationId: create_api_Matricula__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/MatriculaCreate'
              title: Pedidos
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /{id}:
    get:
      tags:
      - Matrícula
      summary: Buscar matrícula por ID
      description: Retorna os dados de uma matrícula pelo ID.
      operationId: read_api_Matricula__id__get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Matrícula
      summary: Alterar status da matrícula (JSON Patch)
      description: 'Altera o status de uma matrícula via JSON Patch. Ex.:

        `[{"op": "replace", "path": "/status", "value": "REA"}]`'
      operationId: patch_api_Matricula__id__patch
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
              title: Patch Ops
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /processamento/fase-3:
    post:
      tags:
      - Matrícula
      summary: Processamento batch (Fase 3)
      description: Dispara o processamento batch da Fase 3 para um período letivo.
      operationId: post_processamento_fase_3_api_Matricula_processamento_fase_3_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessamentoRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessamentoResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /processamento/fase-5:
    post:
      tags:
      - Matrícula
      summary: Reprocessamento batch (Fase 5)
      description: Dispara o reprocessamento da Fase 5 para um período letivo.
      operationId: post_processamento_fase_5_api_Matricula_processamento_fase_5_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessamentoRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessamentoResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /extraordinaria:
    post:
      tags:
      - Matrícula
      summary: Matrícula extraordinária
      description: Processa uma matrícula extraordinária de forma imediata (§7.5).
      operationId: post_extraordinaria_api_Matricula_extraordinaria_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtraordinariaRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /alunos/{aluno}/comprovante-matricula:
    get:
      tags:
      - Matrícula
      summary: Comprovante de matrícula
      description: Gera o comprovante de matrícula do aluno para um período letivo.
      operationId: get_comprovante_api_Matricula_alunos__aluno__comprovante_matricula_get
      parameters:
      - name: aluno
        in: path
        required: true
        schema:
          type: string
          title: Aluno
      - name: periodoLetivo
        in: query
        required: true
        schema:
          type: string
          title: Periodoletivo
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /alunos/{aluno}/historico-processamento:
    get:
      tags:
      - Matrícula
      summary: Histórico de processamento
      description: Retorna a trilha de auditoria do processamento de matrículas de um aluno.
      operationId: get_historico_processamento_api_Matricula_alunos__aluno__historico_processamento_get
      parameters:
      - name: aluno
        in: path
        required: true
        schema:
          type: string
          title: Aluno
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ExtraordinariaRequest:
      properties:
        aluno:
          type: string
          maxLength: 9
          title: Aluno
          description: Matrícula do aluno
        turma:
          type: integer
          title: Turma
          description: ID da turma desejada
      type: object
      required:
      - aluno
      - turma
      title: ExtraordinariaRequest
      description: Matrícula extraordinária — processamento imediato.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    MatriculaCreate:
      properties:
        aluno:
          type: string
          maxLength: 9
          title: Aluno
          description: 'Matrícula do aluno (ex.: ''180012345'')'
        turma:
          type: integer
          title: Turma
          description: ID da turma desejada
        prioridade:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Prioridade
          description: Prioridade do pedido
      type: object
      required:
      - aluno
      - turma
      title: MatriculaCreate
      description: 'Um pedido de matrícula: aluno (matrícula) numa turma.'
    ProcessamentoRequest:
      properties:
        periodo_letivo:
          type: string
          maxLength: 5
          title: Periodo Letivo
          description: 'Período letivo (ex.: ''20182'')'
      type: object
      required:
      - periodo_letivo
      title: ProcessamentoRequest
      description: Dispara o processamento batch de um período letivo.
    ProcessamentoResponse:
      properties:
        fase:
          type: string
          title: Fase
        periodo_letivo:
          type: string
          title: Periodo Letivo
        total_pedidos:
          type: integer
          title: Total Pedidos
          default: 0
        aprovadas:
          type: integer
          title: Aprovadas
          default: 0
        rejeitadas:
          type: integer
          title: Rejeitadas
          default: 0
      type: object
      required:
      - fase
      - periodo_letivo
      title: ProcessamentoResponse
      description: Resumo do processamento batch.
    SearchSet:
      properties:
        resourceType:
          type: string
          title: Resourcetype
          description: Tipo do recurso (sempre 'SearchSet')
          default: SearchSet
        total:
          type: integer
          title: Total
          description: Total de registros que satisfazem o filtro
        count:
          type: integer
          title: Count
          description: Quantidade de itens nesta página
        offset:
          type: integer
          title: Offset
          description: Deslocamento aplicado na paginação
        link:
          additionalProperties:
            type: string
          type: object
          title: Link
          description: Links de navegação (self, next, previous)
        items:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Items
          description: Itens da página (cada um com sua chave 'resourceType')
      type: object
      required:
      - total
      - count
      - offset
      - link
      - items
      title: SearchSet
      description: 'Modelo do envelope de listagem padronizado (SearchSet).


        Usado como `response_model` nos endpoints de pesquisa para que os contratos

        OpenAPI documentem explicitamente o formato da resposta (em vez de um schema

        vazio). Os itens são objetos livres, pois cada recurso carrega seu próprio

        conjunto de campos além da chave `resourceType`.'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
