openapi: 3.1.0
info:
  title: Histórico Acadêmico API
  description: 'Serviço de Entidade — Histórico Acadêmico (modelo SIGAA: SIGAA_RL_ALUNO_CURSO_DISCIPLINA).'
  version: 1.0.0
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /api/HistoricoAcademico
paths:
  /{id}:
    get:
      tags:
      - HistoricoAcademico
      summary: Histórico do aluno
      description: Retorna o histórico (disciplinas cursadas) de um aluno pela matrícula.
      operationId: read_api_HistoricoAcademico__id__get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /{id}/disciplina:
    get:
      tags:
      - HistoricoAcademico
      summary: Pesquisar disciplinas no histórico
      description: Pesquisa disciplinas do histórico de um aluno, com filtros opcionais (SearchSet).
      operationId: search_disciplina_api_HistoricoAcademico__id__disciplina_get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      - name: periodoLetivo
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por período letivo
          title: Periodoletivo
        description: Filtro por período letivo
      - name: disciplina
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por código de disciplina
          title: Disciplina
        description: Filtro por código de disciplina
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /disciplina:
    post:
      tags:
      - HistoricoAcademico
      summary: Lançar disciplina no histórico
      description: Lança uma disciplina cursada no histórico (SIGAA_RL_ALUNO_CURSO_DISCIPLINA).
      operationId: post_disciplina_api_HistoricoAcademico_disciplina_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoricoDisciplinaCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricoDisciplinaResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HistoricoDisciplinaCreate:
      properties:
        aluno_curso:
          type: integer
          title: Aluno Curso
          description: ID do vínculo aluno-curso (SIGAA_RL_ALUNO_CURSO.id)
        disciplina:
          type: string
          maxLength: 7
          title: Disciplina
          description: Código da disciplina cursada
        periodo_letivo:
          type: string
          maxLength: 5
          title: Periodo Letivo
          description: 'Período letivo (ex.: ''20182'')'
        mencao:
          anyOf:
          - type: string
            maxLength: 2
          - type: 'null'
          title: Mencao
          description: 'Menção obtida (ex.: ''SS'', ''MM'', ''SR'')'
      type: object
      required:
      - aluno_curso
      - disciplina
      - periodo_letivo
      title: HistoricoDisciplinaCreate
      description: Schema para lançar uma disciplina cursada no histórico de um vínculo aluno-curso.
    HistoricoDisciplinaResponse:
      properties:
        aluno_curso:
          type: integer
          title: Aluno Curso
        disciplina:
          type: string
          title: Disciplina
        periodo_letivo:
          type: string
          title: Periodo Letivo
        mencao:
          anyOf:
          - type: string
          - type: 'null'
          title: Mencao
      type: object
      required:
      - aluno_curso
      - disciplina
      - periodo_letivo
      title: HistoricoDisciplinaResponse
      description: Schema de resposta de um item do histórico.
    SearchSet:
      properties:
        resourceType:
          type: string
          title: Resourcetype
          description: Tipo do recurso (sempre 'SearchSet')
          default: SearchSet
        total:
          type: integer
          title: Total
          description: Total de registros que satisfazem o filtro
        count:
          type: integer
          title: Count
          description: Quantidade de itens nesta página
        offset:
          type: integer
          title: Offset
          description: Deslocamento aplicado na paginação
        link:
          additionalProperties:
            type: string
          type: object
          title: Link
          description: Links de navegação (self, next, previous)
        items:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Items
          description: Itens da página (cada um com sua chave 'resourceType')
      type: object
      required:
      - total
      - count
      - offset
      - link
      - items
      title: SearchSet
      description: 'Modelo do envelope de listagem padronizado (SearchSet).


        Usado como `response_model` nos endpoints de pesquisa para que os contratos

        OpenAPI documentem explicitamente o formato da resposta (em vez de um schema

        vazio). Os itens são objetos livres, pois cada recurso carrega seu próprio

        conjunto de campos além da chave `resourceType`.'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
