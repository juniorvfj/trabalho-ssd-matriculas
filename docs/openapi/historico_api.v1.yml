openapi: 3.0.3
info:
  title: HistoricoAcademico
  description: >-
    API para tratamento de informações do Historico Academico
  termsOfService: https://redes.unb.br/api/terms/
  contact:
    email: ricardo.puttini@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Find out more about Swagger
  url: https://swagger.io
servers:
  - url: /api/HistoricoAcademico

paths:
  /{id}:
    get:
      tags:
        - HistoricoAcademico
      summary: Retorna histórico do aluno
      description: Retorna o historico de um aluno
      operationId: read
      parameters:
        - name: id
          in: path
          description: id (matricula) do aluno
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricoAcademico'
        '404':
          description: not found
  /{id}/disciplina:
    get:
      tags:
        - HistoricoAcademico
      summary: Busca disciplinas no histórico
      description: Retorna disciplinas de um aluno com filtros
      operationId: searchDisciplina
      parameters:
        - name: id
          in: path
          description: id (matricula) do aluno
          required: true
          schema:
            type: string
        - name: periodoLetivo
          in: query
          description: Período letivo no formato AAAA-N
          required: false
          schema:
            type: string
            example: '2026-1'
        - name: status
          in: query
          description: Status da disciplina
          required: false
          schema:
            $ref: '#/components/schemas/status_Disciplina_HistoricoAcademico'
        - name: disciplina
          in: query
          description: id da disciplina, pode ser uma lista com múltiplos valores separados por vírgula
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Disciplina_HistoricoAcademico'
        '404':
          description: not found
components:
  schemas:
    Resource:
      type: object
      required:
        - resourceType
      properties:
        id:
          type: string
          description: id único da instânica
        resourceType:
          type: string
        lastUpdated:
          type: string
          format: date-time
      discriminator:
        propertyName: resourceType
        mapping:
          Aluno: '#/components/schemas/Aluno'
          Curso: '#/components/schemas/Curso'
          Curriculo: '#/components/schemas/Curriculo'
          Disciplina: '#/components/schemas/Disciplina'
          HistoricoAcademico: '#/components/schemas/HistoricoAcademico'
          Matricula: '#/components/schemas/Matricula'
          Turma: '#/components/schemas/Turma'
    HistoricoAcademico:
      allOf: 
        - $ref: '#/components/schemas/Resource'
        - type: object
          properties:
            id:
              type: string
              example: '252100019'
            cargaHorariaIntegralizadas:
              type: integer
              example: 360
            cargaHorariaPendente:
              type: integer
              example: 1240
            status: 
              type: string
              enum:
                - ativo
                - inativo
                - concluido
            aluno:
              $ref: '#/components/schemas/Aluno_Short' 
            disciplina:
              type: array
              items:
                 $ref: '#/components/schemas/Disciplina_HistoricoAcademico'  
    Aluno_Short:
      allOf: 
        - $ref: '#/components/schemas/Resource'
        - type: object
          properties:
            id:
              type: string
              example: '252100019'
            matricula:
              type: string
              example: '252100019'
            nome:
              type: string
              example: RICARDO STACIARINI PUTTINI
            curso:
              $ref: "#/components/schemas/Curso_Short" 
    PeriodoLetivo:
      type: object
      properties:
        ano:
          type: number
          format: int64
          example: 2025
        periodo:
          type: number
          format: int64
          example: 1
    Curso_Short:
      allOf: 
        - $ref: '#/components/schemas/Resource'
        - type: object
          properties:
            id:
              type: string
              example: '6351'
            codigo:
              type: string
              example: '6351'
            nome:
              type: string
              example: ENGENHARIA DE REDES DE COMUNICAÇÃO
    Disciplina:
      allOf: 
        - $ref: '#/components/schemas/Resource'
        - type: object
          properties:
            id:
              type: string
              example: ENE0276
            codigo:
              type: string
              example: ENE0276
            nome:
              type: string
              example: METODOLOGIA E DESENVOLVIMENTO DE SOFTWARE 
            modalidade:
              type: string
              example: presencial
            cargaHorariaTotal:
              type: integer
              example: 60
    Disciplina_HistoricoAcademico:
      allOf: 
        - $ref: '#/components/schemas/Disciplina'
        - type: object
          properties:
            mencao:
              type: string
              enum:
                - SS
                - MS
                - MM
                - MI
                - II
                - SR
            frequencia:
              type: integer
              example: 80
            status:
              $ref: '#/components/schemas/status_Disciplina_HistoricoAcademico'
            periodoLetivo:
              $ref: '#/components/schemas/PeriodoLetivo'
    status_Disciplina_HistoricoAcademico:
      type: string
      enum:
        - aprovado
        - reprovado
        - cursando
        - trancamento
        - cancelado
        - pendente

    SearchSet:
      type: object  
      required:
        - total
        - link
      properties:
        total:
          type: integer 
        count:
          type: integer
        offset:
          type: integer     
        link:
          type: object
          required:
            - self
          properties:
            self:
              type: string
            next:
              type: string
            previous:
              type: string
        items:
          type: array
          items:
            anyOf:
            - $ref: '#/components/schemas/AlunoResponse'
            - $ref: '#/components/schemas/CursoResponse'
            - $ref: '#/components/schemas/CurriculoResponse'
            - $ref: '#/components/schemas/DisciplinaResponse'
            - $ref: '#/components/schemas/DocenteResponse'
            - $ref: '#/components/schemas/HistoricoAcademicoResponse'
            - $ref: '#/components/schemas/MatriculaResponse'
            - $ref: '#/components/schemas/TurmaResponse'
            - $ref: '#/components/schemas/UnidadeOrganizacionalResponse'
