openapi: 3.1.0
info:
  title: Turma API
  description: 'Serviço de Entidade — Turma e Horário de Aula (modelo SIGAA: SIGAA_TURMA).'
  version: 1.0.0
  contact:
    name: Vicente Jr., Brenno Ribeiro e Rosane Pinheiro
    email: juniorvf@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /api/Turma
paths:
  /horarios:
    get:
      tags:
      - Turma
      summary: Listar horários de aula
      description: Lista os slots de horário de aula (SIGAA_TURMA_HORARIOAULA).
      operationId: get_all_horarios_api_Turma_horarios_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
    post:
      tags:
      - Turma
      summary: Cadastrar horário de aula
      description: Cria um slot de horário de aula.
      operationId: post_horario_api_Turma_horarios_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HorarioAulaCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HorarioAulaResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /:
    get:
      tags:
      - Turma
      summary: Pesquisar turmas
      description: Pesquisa turmas por período letivo e/ou disciplina (SearchSet).
      operationId: get_all_turmas_api_Turma__get
      parameters:
      - name: periodoLetivo
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filtro por período letivo (ex.: ''20182'')'
          title: Periodoletivo
        description: 'Filtro por período letivo (ex.: ''20182'')'
      - name: disciplina
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtro por código de disciplina
          title: Disciplina
        description: Filtro por código de disciplina
      - name: _count
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 10
          title: ' Count'
      - name: _offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: ' Offset'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSet'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Turma
      summary: Cadastrar turma
      description: Abre uma nova turma de uma disciplina num período letivo.
      operationId: post_turma_api_Turma__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurmaCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurmaResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /{id}:
    get:
      tags:
      - Turma
      summary: Buscar turma por ID
      description: Retorna os dados de uma turma pelo seu ID.
      operationId: get_turma_api_Turma__id__get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HorarioAulaCreate:
      properties:
        id:
          type: string
          maxLength: 3
          title: Id
          description: 'Código do slot (ex.: ''208'')'
        dia:
          type: string
          maxLength: 3
          title: Dia
          description: Dia (SEG, TER, ...)
        hora_inicio:
          type: string
          maxLength: 5
          title: Hora Inicio
          description: 'Hora de início (ex.: ''08:00'')'
        hora_fim:
          type: string
          maxLength: 5
          title: Hora Fim
          description: 'Hora de fim (ex.: ''09:50'')'
      type: object
      required:
      - id
      - dia
      - hora_inicio
      - hora_fim
      title: HorarioAulaCreate
      description: Schema para criação de um slot de horário (SIGAA_TURMA_HORARIOAULA).
    HorarioAulaResponse:
      properties:
        id:
          type: string
          maxLength: 3
          title: Id
          description: 'Código do slot (ex.: ''208'')'
        dia:
          type: string
          maxLength: 3
          title: Dia
          description: Dia (SEG, TER, ...)
        hora_inicio:
          type: string
          maxLength: 5
          title: Hora Inicio
          description: 'Hora de início (ex.: ''08:00'')'
        hora_fim:
          type: string
          maxLength: 5
          title: Hora Fim
          description: 'Hora de fim (ex.: ''09:50'')'
      type: object
      required:
      - id
      - dia
      - hora_inicio
      - hora_fim
      title: HorarioAulaResponse
      description: Schema de resposta de um slot de horário.
    SearchSet:
      properties:
        resourceType:
          type: string
          title: Resourcetype
          description: Tipo do recurso (sempre 'SearchSet')
          default: SearchSet
        total:
          type: integer
          title: Total
          description: Total de registros que satisfazem o filtro
        count:
          type: integer
          title: Count
          description: Quantidade de itens nesta página
        offset:
          type: integer
          title: Offset
          description: Deslocamento aplicado na paginação
        link:
          additionalProperties:
            type: string
          type: object
          title: Link
          description: Links de navegação (self, next, previous)
        items:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Items
          description: Itens da página (cada um com sua chave 'resourceType')
      type: object
      required:
      - total
      - count
      - offset
      - link
      - items
      title: SearchSet
      description: 'Modelo do envelope de listagem padronizado (SearchSet).


        Usado como `response_model` nos endpoints de pesquisa para que os contratos

        OpenAPI documentem explicitamente o formato da resposta (em vez de um schema

        vazio). Os itens são objetos livres, pois cada recurso carrega seu próprio

        conjunto de campos além da chave `resourceType`.'
    TurmaCreate:
      properties:
        codigo:
          type: string
          maxLength: 2
          title: Codigo
          description: 'Código da turma (ex.: ''01'')'
        periodo_letivo:
          type: string
          maxLength: 5
          title: Periodo Letivo
          description: 'Período letivo (ex.: ''20182'')'
        disciplina:
          type: string
          maxLength: 7
          title: Disciplina
          description: 'Código da disciplina (ex.: ''CIC0007'')'
        vagas:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Vagas
          description: Quantidade de vagas
        sede:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
          title: Sede
          description: Sede/campus
      type: object
      required:
      - codigo
      - periodo_letivo
      - disciplina
      title: TurmaCreate
      description: Schema para criação de uma turma (SIGAA_TURMA).
    TurmaResponse:
      properties:
        id:
          type: integer
          title: Id
        codigo:
          type: string
          title: Codigo
        periodo_letivo:
          type: string
          title: Periodo Letivo
        disciplina:
          type: string
          title: Disciplina
        vagas:
          anyOf:
          - type: integer
          - type: 'null'
          title: Vagas
        sede:
          anyOf:
          - type: string
          - type: 'null'
          title: Sede
      type: object
      required:
      - id
      - codigo
      - periodo_letivo
      - disciplina
      title: TurmaResponse
      description: Schema de resposta da turma.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
